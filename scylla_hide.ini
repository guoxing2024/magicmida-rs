[SETTINGS]
CurrentProfile=UncoverEngine
[UncoverEngine]
DLLNormal=1
DLLStealth=1
DLLUnload=1
; 关键：启用 NtQueryObject 拦截（Themida 用它检测调试对象句柄）
NtQueryObjectHook=1
; NtClose 不钩（保持 0 让 HW BP 可触发）
NtCloseHook=0
; 关键：不钩 KiUserExceptionDispatcher！否则 HW BP 异常被吞，PhaseDetector 永不触发
KiUserExceptionDispatcherHook=0
; 启用所有标准反调试拦截
NtSetInformationThreadHook=1
NtQueryInformationProcessHook=1
NtQuerySystemInformationHook=1
NtSetContextThreadHook=1
NtGetContextThreadHook=1
NtCreateThreadExHook=1
; 启用反 Timing 检测
NtQueryPerformanceCounterHook=1
NtQuerySystemTimeHook=1
GetTickCountHook=1
GetTickCount64Hook=1
GetLocalTimeHook=1
GetSystemTimeHook=1
; 启用窗口检测
NtUserBuildHwndListHook=1
NtUserFindWindowExHook=1
NtUserQueryWindowHook=1
NtUserGetForegroundWindowHook=1
; 启用反 Yield 检测
NtYieldExecutionHook=1
; NtContinue - 不钩（ScyllaHide 默认也可用）
NtContinueHook=0
NtSetInformationProcessHook=1
OutputDebugStringHook=1
; PEB 全部隐藏
PebBeingDebugged=1
PebHeapFlags=1
PebNtGlobalFlag=1
PebStartupInfo=1
PebOsBuildNumber=1
RemoveDebugPrivileges=1
; EP 相关
RemoveEPBreak=0
SkipEPOutsideCode=0
BreakOnTLS=0
KillAntiAttach=0
; 服务配置
AutostartServer=0
ServerPort=1337
X64Fix=0
